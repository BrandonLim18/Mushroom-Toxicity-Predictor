<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Botanical Predictor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            background-image: url("{{ url_for('static', filename='mushroom_bg.jpg') }}");
            background-size: cover;          
            background-position: center;     
            background-attachment: fixed;    
            font-family: 'Segoe UI', sans-serif; 
            color: #2c4c27; 
        }
        .journal-container { 
            background: rgba(252, 255, 251, 0.85); 
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 12px; 
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.4); 
            margin-top: 40px; 
            border-left: 10px solid rgba(74, 124, 71, 0.9);
        }
        .journal-header { 
            background-color: transparent; 
            padding: 20px; 
            border-bottom: 2px solid rgba(163, 184, 158, 0.5);
        }
        h2, .section-title { font-family: 'Georgia', serif; color: #2c4c27; font-weight: bold; }
        
        /* Disabled click navigation */
        .nav-pills .nav-link { 
            color: #5c8058; 
            text-align: left; 
            border-radius: 8px; 
            margin-bottom: 5px; 
            font-weight: 600; 
            padding: 10px 15px; 
            pointer-events: none; 
        }
        
        .nav-pills .nav-link.active { background-color: #4a7c47; color: white; }
        .form-select { border: 1px solid #c3d4be; background-color: #fdfdfc; font-size: 0.9rem; }
        label { font-weight: 600; color: #3d6338; margin-top: 8px; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px; }
        .section-header { border-bottom: 2px dashed #a3b89e; padding-bottom: 5px; margin-bottom: 15px; }
        .btn-predict { background-color: #d4a373; border: none; color: white; font-weight: bold; border-radius: 8px; }
        .btn-predict:hover { background-color: #bc8a59; }
        .wizard-btn { background-color: #4a7c47; color: white; font-weight: bold; }
        .wizard-btn:hover { background-color: #3d6338; color: white; }
    </style>
</head>
<body>

<div class="container pb-5">
    <div class="row justify-content-center">
        <div class="col-lg-11 journal-container p-0">
            <div class="journal-header text-center">
                <h2>Mushroom Toxicity Predictor</h2>
                <p class="text-muted mb-0 fst-italic">Digital Botanical Field Journal & Analysis</p>
            </div>

            <div class="p-4">
                {% if prediction %}
                <div class="text-center p-4 mb-4 rounded shadow-sm {% if 'TOXIC' in prediction %}bg-danger text-white{% else %}bg-success text-white{% endif %}">
                    <h3 class="fw-bold mb-3">Field Result: {{ prediction }}</h3>
                    <!-- NEW: Classify Another Mushroom Button -->
                    <a href="/" class="btn btn-light fw-bold px-4 py-2 text-dark shadow-sm">↺ Classify Another Mushroom</a>
                </div>
                {% endif %}

                <form id="mushroomForm" method="POST" action="/" novalidate>
                    <div class="row mt-2">
                        <!-- Navigation -->
                        <div class="col-md-3 border-end pe-3">
                            <div class="nav flex-column nav-pills" role="tablist">
                                <button class="nav-link active" id="nav-tab1" data-bs-toggle="pill" data-bs-target="#tab1" type="button">🌿 1. Cap & Stalk</button>
                                <button class="nav-link" id="nav-tab2" data-bs-toggle="pill" data-bs-target="#tab2" type="button">🍄 2. Gills & Veil</button>
                                <button class="nav-link" id="nav-tab3" data-bs-toggle="pill" data-bs-target="#tab3" type="button">🌍 3. Ecology & Odor</button>
                                <button class="nav-link" id="nav-tab4" data-bs-toggle="pill" data-bs-target="#tab4" type="button">📝 4. Field Notes</button>
                            </div>
                        </div>

                        <!-- Content -->
                        <div class="col-md-9 ps-4">
                            <div class="tab-content">
                                
                                <!-- TAB 1: Cap & Stalk -->
                                <div class="tab-pane fade show active" id="tab1">
                                    <h5 class="section-title section-header">Morphology: Cap & Stalk</h5>
                                    <div class="row">
                                        <div class="col-md-4"><label>Cap Shape</label><select name="CapShape" class="form-select" required><option value="" disabled selected>Select Shape...</option><option>convex</option><option>bell</option><option>flat</option><option>knobbed</option><option>sunken</option></select></div>
                                        <div class="col-md-4"><label>Cap Surface</label><select name="CapSurface" class="form-select" required><option value="" disabled selected>Select Surface...</option><option>smooth</option><option>scaly</option><option>fibrous</option><option>grooves</option></select></div>
                                        <div class="col-md-4"><label>Cap Color</label><select name="CapColor" class="form-select" required><option value="" disabled selected>Select Color...</option><option>brown</option><option>yellow</option><option>white</option><option>gray</option><option>red</option><option>pink</option></select></div>
                                        
                                        <div class="col-md-4 mt-2"><label>Stalk Shape</label><select name="StalkShape" class="form-select" required><option value="" disabled selected>Select Shape...</option><option>enlarging</option><option>tapering</option></select></div>
                                        <div class="col-md-4 mt-2"><label>Stalk Root</label><select name="StalkRoot" class="form-select" required><option value="" disabled selected>Select Root...</option><option>bulbous</option><option>club</option><option>equal</option><option>Unknown</option></select></div>
                                        <div class="col-md-4 mt-2"><label>Stalk Color (Above)</label><select name="StalkColorAboveRing" class="form-select" required><option value="" disabled selected>Select Color...</option><option>white</option><option>pink</option><option>gray</option><option>brown</option></select></div>
                                        
                                        <div class="col-md-6 mt-2"><label>Stalk Surface (Above)</label><select name="StalkSurfaceAboveRing" class="form-select" required><option value="" disabled selected>Select Surface...</option><option>smooth</option><option>silky</option><option>fibrous</option><option>scaly</option></select></div>
                                        <div class="col-md-6 mt-2"><label>Stalk Surface (Below)</label><select name="StalkSurfaceBelowRing" class="form-select" required><option value="" disabled selected>Select Surface...</option><option>smooth</option><option>silky</option><option>fibrous</option><option>scaly</option></select></div>
                                        <div class="col-md-12 mt-2"><label>Stalk Color (Below)</label><select name="StalkColorBelowRing" class="form-select" required><option value="" disabled selected>Select Color...</option><option>white</option><option>pink</option><option>gray</option><option>brown</option></select></div>
                                    </div>
                                    <div class="d-flex justify-content-end mt-4">
                                        <button type="button" class="btn wizard-btn px-4" onclick="switchTab('nav-tab2')">Next ➔</button>
                                    </div>
                                </div>

                                <!-- TAB 2: Gills & Veil -->
                                <div class="tab-pane fade" id="tab2">
                                    <h5 class="section-title section-header">Characteristics: Gills & Rings</h5>
                                    <div class="row">
                                        <div class="col-md-6"><label>Gill Attachment</label><select name="GillAttachment" class="form-select" required><option value="" disabled selected>Select Attachment...</option><option>free</option><option>attached</option></select></div>
                                        <div class="col-md-6"><label>Gill Spacing</label><select name="GillSpacing" class="form-select" required><option value="" disabled selected>Select Spacing...</option><option>close</option><option>crowded</option></select></div>
                                        <div class="col-md-6 mt-2"><label>Gill Size</label><select name="GillSize" class="form-select" required><option value="" disabled selected>Select Size...</option><option>broad</option><option>narrow</option></select></div>
                                        <div class="col-md-6 mt-2"><label>Gill Color</label><select name="GillColor" class="form-select" required><option value="" disabled selected>Select Color...</option><option>black</option><option>brown</option><option>gray</option><option>pink</option><option>white</option><option>chocolate</option></select></div>
                                        
                                        <div class="col-md-4 mt-2"><label>Veil Color</label><select name="VeilColor" class="form-select" required><option value="" disabled selected>Select Color...</option><option>white</option><option>brown</option><option>orange</option><option>yellow</option></select></div>
                                        <div class="col-md-4 mt-2"><label>Ring Number</label><select name="RingNumber" class="form-select" required><option value="" disabled selected>Select Number...</option><option>one</option><option>two</option><option>none</option></select></div>
                                        <div class="col-md-4 mt-2"><label>Ring Type</label><select name="RingType" class="form-select" required><option value="" disabled selected>Select Type...</option><option>pendant</option><option>evanescent</option><option>large</option><option>flaring</option><option>none</option></select></div>
                                    </div>
                                    <div class="d-flex justify-content-between mt-4">
                                        <button type="button" class="btn btn-outline-secondary px-4" onclick="switchTab('nav-tab1')">← Back</button>
                                        <button type="button" class="btn wizard-btn px-4" onclick="switchTab('nav-tab3')">Next ➔</button>
                                    </div>
                                </div>

                                <!-- TAB 3: Ecology -->
                                <div class="tab-pane fade" id="tab3">
                                    <h5 class="section-title section-header">Ecology, Odor & Spores</h5>
                                    <div class="row">
                                        <div class="col-md-6"><label>Odor (CRITICAL TRAIT)</label><select name="Odor" id="odor" class="form-select" required><option value="" disabled selected>Select Odor...</option><option>none</option><option>almond</option><option>anise</option><option>pungent</option><option>foul</option><option>creosote</option><option>fishy</option><option>spicy</option></select></div>
                                        <div class="col-md-6"><label>Bruises</label><select name="Bruises" class="form-select" required><option value="" disabled selected>Select Bruising...</option><option>True</option><option>False</option></select></div>
                                        <div class="col-md-12 mt-2"><label>Spore Print Color</label><select name="SporePrintColor" id="spore" class="form-select" required><option value="" disabled selected>Select Spore Color...</option><option>brown</option><option>black</option><option>white</option><option>green</option><option>purple</option><option>chocolate</option></select></div>
                                        
                                        <div class="col-md-6 mt-2"><label>Population</label><select name="Population" class="form-select" required><option value="" disabled selected>Select Population...</option><option>scattered</option><option>numerous</option><option>abundant</option><option>several</option><option>solitary</option><option>clustered</option></select></div>
                                        <div class="col-md-6 mt-2"><label>Habitat</label><select name="Habitat" id="habitat" class="form-select" required><option value="" disabled selected>Select Habitat...</option><option>woods</option><option>grasses</option><option>paths</option><option>leaves</option><option>urban</option><option>meadows</option></select></div>
                                    </div>
                                    <div class="d-flex justify-content-between mt-4">
                                        <button type="button" class="btn btn-outline-secondary px-4" onclick="switchTab('nav-tab2')">← Back</button>
                                        <button type="button" class="btn wizard-btn px-4" onclick="switchTab('nav-tab4')">Next ➔</button>
                                    </div>
                                </div>

                                <!-- TAB 4: Notes -->
                                <div class="tab-pane fade" id="tab4">
                                    <h5 class="section-title section-header">Botanist's Official Log</h5>
                                    <button type="button" class="btn btn-outline-success w-100 mb-3" onclick="generateNote()">Generate Field Note</button>
                                    <textarea class="form-control mb-4 shadow-sm" name="botanist_note" id="botanist_note" rows="12" style="font-family: monospace; font-size: 0.9rem; background-color: #f8fcf8;">{% if note %}{{ note }}{% endif %}</textarea>
                                    
                                    <div class="d-flex justify-content-between mt-2">
                                        <button type="button" class="btn btn-outline-secondary px-4" onclick="switchTab('nav-tab3')">← Back</button>
                                        <button type="submit" class="btn btn-predict px-5 fs-5">Run Analysis</button>
                                    </div>
                                </div>

                            </div>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function switchTab(tabId) {
        let triggerEl = document.querySelector('#' + tabId);
        let tab = new bootstrap.Tab(triggerEl);
        tab.show();
    }

    function generateNote() {
        // Helper function to safely grab dropdown text
        const getVal = (name) => {
            let el = document.querySelector(`select[name="${name}"]`);
            return el && el.value !== "" ? el.options[el.selectedIndex].text.toLowerCase() : "[UNRECORDED]";
        };

        // 1. Ecology Data
        let habitat = getVal('Habitat');
        let pop = getVal('Population');
        
        // 2. Morphology Data
        let capShape = getVal('CapShape');
        let capSurface = getVal('CapSurface');
        let capColor = getVal('CapColor');
        let stalkShape = getVal('StalkShape');
        let stalkRoot = getVal('StalkRoot');
        
        // 3. Characteristics
        let gillSpace = getVal('GillSpacing');
        let ringType = getVal('RingType');
        
        // 4. Sensory Data
        let odor = getVal('Odor');
        let bruises = getVal('Bruises');
        let spore = getVal('SporePrintColor');

        // Compile the Professional Log
        let report = `BOTANICAL FIELD OBSERVATION LOG\n`;
        report += `====================================================\n\n`;
        
        report += `1. ECOLOGICAL CONTEXT:\n`;
        report += `Specimen located in a ${habitat} environment, exhibiting a ${pop} distribution pattern.\n\n`;
        
        report += `2. MACROSCOPIC MORPHOLOGY:\n`;
        report += `The pileus (cap) is ${capShape}, characterized by a ${capSurface} surface texture and ${capColor} coloration. The stipe (stalk) structure is ${stalkShape} featuring a ${stalkRoot} base.\n\n`;
        
        report += `3. HYMENOPHORE (GILLS & RINGS):\n`;
        report += `Gill spacing is classified as ${gillSpace}. The specimen possesses a ${ringType} ring structure.\n\n`;
        
        report += `4. SENSORY & SPORE ANALYSIS:\n`;
        report += `${bruises === 'true' ? 'Visible oxidation/bruising present upon handling.' : 'No visible bruising observed upon handling.'} Olfactory assessment detects an odor classified strictly as '${odor}'. Spore print yielded a ${spore} deposit.\n\n`;
        
        report += `STATUS: Field observation complete. Awaiting deep-learning diagnostic confirmation...`;

        document.getElementById('botanist_note').value = report;
    }

    // NEW: The Smart Validator
    document.getElementById('mushroomForm').addEventListener('submit', function(event) {
        event.preventDefault(); // Stop the form from submitting immediately
        
        let isValid = true;
        let firstInvalidTab = null;

        // Reset any previous red error highlights
        let allSelects = this.querySelectorAll('select');
        allSelects.forEach(el => el.classList.remove('is-invalid'));

        // Scan all fields for empty values
        allSelects.forEach(function(select) {
            if (select.value === "") {
                isValid = false;
                select.classList.add('is-invalid'); // Bootstrap class that makes the box RED

                // If this is the FIRST error we found, figure out which tab it lives on!
                if (!firstInvalidTab) {
                    let tabPane = select.closest('.tab-pane');
                    if (tabPane) {
                        firstInvalidTab = tabPane.id;
                    }
                }
            }
        });

        if (!isValid) {
            // Automatically flip the UI to the tab with the missing information
            if (firstInvalidTab) {
                let tabButton = document.querySelector(`[data-bs-target="#${firstInvalidTab}"]`);
                if (tabButton) {
                    let tab = new bootstrap.Tab(tabButton);
                    tab.show();
                }
            }
            alert("⚠️ Please fill out all highlighted required fields before running the analysis!");
        } else {
            // If everything is perfectly filled out, submit the data!
            this.submit();
        }
    });
</script>
<!-- ADD THIS AT THE VERY BOTTOM, RIGHT BEFORE </body> -->
{% if prediction %}
<script>
    // This runs immediately after the page reloads from a prediction
    document.addEventListener("DOMContentLoaded", function() {
        // Automatically flip to Tab 4
        switchTab('nav-tab4');
        
        // Smoothly scroll down to the text box so the user sees the stamp!
        setTimeout(() => {
            document.getElementById('botanist_note').scrollIntoView({behavior: "smooth", block: "center"});
        }, 100);
    });
</script>
{% endif %}
</body>
</html>
